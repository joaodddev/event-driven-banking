server:
  port: 8081

spring:
  application:
    name: transfer-service

  datasource:
    url: jdbc:postgresql://localhost:5433/transfers
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

account-service:
  url: http://localhost:8080